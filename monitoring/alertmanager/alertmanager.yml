global:
  resolve_timeout: 5m
  # ── Uncomment and fill in when you want email alerts ──────────────────────
  smtp_smarthost: "sandbox.smtp.mailtrap.io:587"
  smtp_from: "alerts@yourdomain.com"
  smtp_auth_username: "e21fe9e0e440c1"
  smtp_auth_password: "f8c006d192c71f"

route:
  group_by: [alertname, job]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: default

receivers:
  - name: default
    # ── No-op receiver (alerts fire but go nowhere) ─────────────────────────
    # Remove the empty block below and uncomment ONE of the sections when ready.

    # ── Option A: Slack ──────────────────────────────────────────────────────
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    #     channel: "#mlops-alerts"
    #     title: "{{ .CommonAnnotations.summary }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

    # ── Option B: Email ──────────────────────────────────────────────────────
    email_configs:
      - to: "team@gmail.com"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, job]